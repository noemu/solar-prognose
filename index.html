<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Solar Prognose" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description"
        content="Solar Prognose mit Sonnen-Icon, Leistungsdiagramm, Live-Ausrichtung und Open-Meteo Forecast." />

    <link rel="icon" type="image/svg+xml" href="/solar-prognose-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/solar-prognose-icon.svg" />

    <title>Solar Prognose</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f9fafb;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
        }

        #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registrierung (nur ausserhalb von localhost) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                const localHosts = ['localhost', '127.0.0.1', '::1'];
                const isLocalDev = localHosts.includes(window.location.hostname);

                if (isLocalDev) {
                    // Alte SW/Caches koennen HMR/WebSocket im Dev-Modus stoeren.
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map((reg) => reg.unregister()));
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map((key) => caches.delete(key)));
                    return;
                }

                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Service Worker registriert:', reg);
                }).catch(err => {
                    console.log('Service Worker Registrierung fehlgeschlagen:', err);
                });
            });
        }

        // Prevent double tap zoom on mobile
        document.addEventListener('touchmove', function (e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Solar Align" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Richte dein PV-Modul mit deinem Handy aus. GPS, Kompass und Sensor-gesteuert." />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%23fbbf24'/><path d='M96 60L110 85H82Z' fill='%231a1a2e'/></svg>" />

    <title>Solar Align - PV Modul Ausrichtung</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
        }

        #root {
            width: 100%;
            height: 100%;
        }
    </style>
  <script type="module" crossorigin src="./assets/index-DWV7I8So.js"></script>
</head>

<body>
    <div id="root"></div>

    <!-- Service Worker Registrierung -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Service Worker registriert:', reg);
                }).catch(err => {
                    console.log('Service Worker Registrierung fehlgeschlagen:', err);
                });
            });
        }

        // Prevent double tap zoom on mobile
        document.addEventListener('touchmove', function (e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>

</html>
